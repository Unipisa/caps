  updatedAt: String
}

type Query {
  users(limit: Int, username: String, id_number: String, first_name: String, last_name: String, email: String, admin: Boolean): [User!]!
  user(id: ID!): User
  exams: [Exam!]!
  examsByIds(ids: [ID!]!): [Exam!]!
  exam(id: ID!): Exam
  degrees: [Degree!]!
  degree(id: ID!): Degree
  curricula: [Curriculum!]!
  curriculum(id: ID!): Curriculum
  proposals(user_id: ID): [Proposal!]!
  proposal(id: ID!): Proposal
  attachments(uploader_id: ID): [Attachment!]!
  attachment(id: ID!): Attachment
}

type Mutation {
  createUser(username: String!, password: String!, admin: Boolean): User
  updateDegree(id: ID!, input: DegreeInput!): Degree
  deleteDegree(id: ID!): Boolean
  createCurriculum(input: CurriculumInput!): Curriculum
  updateCurriculum(id: ID!, input: CurriculumInput!): Curriculum
  deleteCurriculum(id: ID!): Boolean
}

